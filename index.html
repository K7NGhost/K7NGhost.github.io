<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>K7NGhost</title>
    <link rel="stylesheet" href="styles.css"> </head>
<body>
    <div id="InfoPanel">
        <!-- Hero Section -->
        <section>
            <h1> Hi, I'm Kevin Argueta</h1>
            <p> A college student studying Computer Science</p>
            <a href="#projects" class="btn">View My Work</a>
        </section>

        <!-- About Section -->
        <section id="about">
            <h2>About Me</h2>
            <p>[Write a brief paragraph about yourself, your background, and what you do.]</p>
        </section>
    </div>
    

    <!-- Contact Section -->
    <section id="contact">
        <h2>Contact</h2>
        <p>Feel free to reach out to me:</p>
        <form action="[Your Form Handler or Email Link]" method="POST">
            <label for="name">Name:</label>
            <input type="text" id="name" name="name" required>

            <label for="email">Email:</label>
            <input type="email" id="email" name="email" required>

            <label for="message">Message:</label>
            <textarea id="message" name="message" required></textarea>

            <button type="submit">Send</button>
        </form>
    </section>

    <!-- Footer Section -->
    <footer>
        <p>&copy; [Year] [Your Name]. All rights reserved.</p>
        <ul>
            <li><a href="[Your LinkedIn Profile]" target="_blank">LinkedIn</a></li>
            <li><a href="[Your GitHub Profile]" target="_blank">GitHub</a></li>
            <li><a href="[Your Twitter Profile]" target="_blank">Twitter</a></li>
            <!-- Add other links as needed -->
        </ul>
    </footer>
</body>
</html>
